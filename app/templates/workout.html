<!DOCTYPE html>
<html>
<head>
    <title>Log Workout</title>
</head>
<body>
    <h1>Log Your Workout</h1>
    <form method="post">
        <label>Exercise:</label><input name="exercise"><br>
        <label>Weight:</label><input name="weight"><br>
        <label>Reps:</label><input name="reps"><br>
        <label>Sets:</label><input name="sets"><br>
        <button type="submit">Submit</button>
    </form>
    <a href="/">Back</a>
</body>
</html>
